services:
  aerospike:
    image: aerospike:ce-8.1.1.1_1
    container_name: pseudomarkets-nextgen-aerospike
    platform: linux/arm64
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "asinfo -v 'status' | grep -q '^ok$'"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - ../.docker-data/aerospike:/opt/aerospike/data
      - ../infrastructure/aerospike/aerospike.conf:/opt/aerospike/etc/aerospike.conf:ro
    command:
      - "--config-file"
      - "/opt/aerospike/etc/aerospike.conf"
    restart: unless-stopped

  pseudomarkets.security.identityserver.web:
    image: pseudomarkets.security.identityserver.web
    build:
      context: ../pseudomarkets-nextgen-idp
      dockerfile: src/PseudoMarkets.Security.IdentityServer.Web/Dockerfile
    container_name: pseudomarkets-nextgen-idp-web
    env_file:
      - ../.env
    depends_on:
      aerospike:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Aerospike__Host: aerospike
      Aerospike__Port: 3000
      JwtConfiguration__Issuer: pseudomarkets-idp
      JwtConfiguration__Audience: pseudomarkets-platform
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "grep -q ':1F90' /proc/net/tcp /proc/net/tcp6"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  postgres:
    image: postgres:17
    container_name: pseudomarkets-nextgen-postgres
    environment:
      POSTGRES_DB: pseudomarkets_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${Postgres__Password:-postgres}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pseudomarkets_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - ../.docker-data/postgres:/var/lib/postgresql/data
    restart: unless-stopped

  pseudomarkets.tradinginstruments.service:
    image: pseudomarkets.tradinginstruments.service
    build:
      context: ..
      dockerfile: pseudomarkets-nextgen-instrument-db/src/PseudoMarkets.ReferenceData.TradingInstruments.Service/Dockerfile
    container_name: pseudomarkets-nextgen-trading-instruments-service
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      pseudomarkets.security.identityserver.web:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8083
      ConnectionStrings__PseudoMarketsDb: Host=postgres;Port=5432;Database=pseudomarkets_db;Username=postgres;Password=${Postgres__Password:-postgres}
      IdentityAuthorization__IdentityServerBaseUrl: http://pseudomarkets-nextgen-idp-web:8080
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "grep -q ':1F93' /proc/net/tcp /proc/net/tcp6"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  trading-instruments-seed:
    image: postgres:17
    container_name: pseudomarkets-nextgen-trading-instruments-seed
    depends_on:
      pseudomarkets.tradinginstruments.service:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: pseudomarkets_db
      POSTGRES_USER: postgres
      PGPASSWORD: ${Postgres__Password:-postgres}
    volumes:
      - ../infrastructure/postgres/seed-trading-instruments.sh:/seed/seed-trading-instruments.sh:ro
      - ../infrastructure/postgres/trading-instruments:/seed/trading-instruments:ro
    command: ["sh", "/seed/seed-trading-instruments.sh"]
    restart: "no"
